name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: ./build-exe.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReInkPyFix-windows
          path: dist/ReInkPyFix.exe

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built executable
        uses: actions/download-artifact@v4
        with:
          name: ReInkPyFix-windows
          path: release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "release-assets/ReInkPyFix.exe#ReInkPyFix.exe" --clobber
          else
            gh release create "$TAG_NAME" "release-assets/ReInkPyFix.exe#ReInkPyFix.exe" --verify-tag --generate-notes
          fi
